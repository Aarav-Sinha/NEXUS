<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus — Smart Study Portal</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ══ AMBIENT BACKGROUND ══ -->
<div class="ambient-bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="grain"></div>
</div>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen" class="screen active">
  <div class="login-card glass">
    <div class="logo-mark">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <polygon points="24,4 44,36 4,36" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
        <polygon points="24,14 36,34 12,34" fill="var(--accent)" opacity="0.18"/>
        <line x1="24" y1="4" x2="24" y2="36" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
      </svg>
    </div>
    <h1 class="brand-name">Nexus</h1>
    <p class="brand-sub">Your study universe, organised.</p>
    <div class="login-divider"></div>
    <button class="btn-google" id="google-login-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <p class="login-note">Students & Teachers only · Secured by Google</p>
    <div class="credits-login">Developed by <strong>Aarav Sinha</strong></div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="app-screen" class="screen">

  <!-- Sidebar -->
  <aside class="sidebar glass" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-inline">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <polygon points="24,4 44,36 4,36" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
          <polygon points="24,14 36,34 12,34" fill="var(--accent)" opacity="0.22"/>
        </svg>
        <span class="logo-text">Nexus</span>
      </div>
      <button class="sidebar-toggle" id="sidebar-close">✕</button>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- dynamically filled -->
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip" id="user-chip">
        <img id="user-avatar" src="" alt=""/>
        <span id="user-name-sidebar"></span>
      </div>
      <button class="btn-icon" id="logout-btn" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <div class="main-wrap" id="main-wrap">

    <!-- Topbar -->
    <header class="topbar glass">
      <button class="btn-icon menu-btn" id="menu-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <!-- Breadcrumb -->
      <div class="breadcrumb" id="breadcrumb">
        <span class="crumb active" data-path="">Home</span>
      </div>
      <div class="topbar-right">
        <span class="admin-badge" id="admin-badge" style="display:none">⚡ Admin</span>
        <button class="btn-primary" id="add-btn" style="display:none">+ Add</button>
        <img id="topbar-avatar" src="" class="topbar-avatar" alt=""/>
      </div>
    </header>

    <!-- Content -->
    <main class="content" id="content">
      <div class="content-inner" id="content-inner">
        <!-- dynamically filled -->
      </div>
    </main>

  </div>
</div>

<!-- ══ PDF VIEWER MODAL ══ -->
<div id="pdf-modal" class="modal-overlay" style="display:none">
  <div class="pdf-modal-inner">
    <div class="pdf-modal-header">
      <span id="pdf-modal-title" class="pdf-title-text">Document</span>
      <div class="pdf-controls">
        <a id="pdf-open-new" href="#" target="_blank" class="btn-icon" title="Open in new tab">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button id="pdf-modal-close" class="btn-icon">✕</button>
      </div>
    </div>
    <iframe id="pdf-iframe" src="" frameborder="0"></iframe>
  </div>
</div>

<!-- ══ ADMIN ADD MODAL ══ -->
<div id="add-modal" class="modal-overlay" style="display:none">
  <div class="modal-card glass">
    <div class="modal-header">
      <h2 id="add-modal-title">Add Item</h2>
      <button class="btn-icon" id="add-modal-close">✕</button>
    </div>
    <div class="modal-body" id="add-modal-body">
      <!-- Dynamic form -->
    </div>
  </div>
</div>

<!-- ══ CONTEXT MENU ══ -->
<div id="ctx-menu" class="ctx-menu glass" style="display:none">
  <button class="ctx-item" id="ctx-rename">✏️ Rename</button>
  <button class="ctx-item" id="ctx-delete">🗑️ Delete</button>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
